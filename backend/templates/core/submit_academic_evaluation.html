{% extends 'core/base.html' %}
{% block title %}Submit Academic Evaluation{% endblock %}
{% block content %}
<div class="card">
    <h2>Academic Evaluation — {{ placement.student }} at {{ placement.company.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit Evaluation</button>
        <a href="{% url 'academic_dashboard' %}" class="btn" style="background:#95a5a6;color:white;margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
