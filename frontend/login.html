<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ILES — Login</title>
  <style>
    :root {
      --bg:            #f5f0ff;
      --surface:       #ffffff;
      --border:        #d8c8f0;
      --shadow:        0 2px 8px rgba(100,80,160,.10);
      --header-bg:     #c8b4e4;
      --header-text:   #3d2b5a;
      --text:          #3d3d5c;
      --text-muted:    #7a7a9d;
      --btn-primary:         #9bc4d8;
      --btn-primary-hover:   #78aac4;
      --btn-success:         #9dd4a4;
      --btn-success-hover:   #78b87e;
      --btn-secondary:       #d4c8e8;
      --btn-secondary-hover: #b8a8d4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 14px 28px;
      box-shadow: 0 2px 8px rgba(100,80,160,.18);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    header h1 span { font-size: .82em; opacity: .72; }

    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(80,60,140,.14);
      border: 1px solid var(--border);
    }
    .auth-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--header-text);
      margin-bottom: 6px;
    }
    .auth-card .subtitle {
      font-size: .88rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-weight: 600;
      font-size: .82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-group input,
    .form-group select {
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      background: var(--surface);
      color: var(--text);
      transition: border-color .18s, box-shadow .18s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(155,196,216,.22);
    }
    .form-group input.error,
    .form-group select.error {
      border-color: #d04040;
    }

    .field-error {
      font-size: .8rem;
      color: #d04040;
      display: none;
    }
    .field-error.visible { display: block; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .88rem;
      margin-bottom: 18px;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-error   { background: #f4d8d8; color: #5a1e1e; border-left: 4px solid #d04040; }
    .alert-success { background: #d8f4dd; color: #1e5a28; border-left: 4px solid #4caf78; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 11px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: background .18s, transform .1s;
      width: 100%;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary  { background: var(--btn-primary);  color: #1a3a4a; }
    .btn-primary:hover  { background: var(--btn-primary-hover); }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: .88rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: #6a52a0;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>ILES <span>— Internship Logging &amp; Evaluation System</span></h1>
</header>

<div class="page-wrap">
  <div class="auth-card">
    <h2>Welcome back 👋</h2>
    <p class="subtitle">Sign in to your account to continue.</p>

    <div class="alert alert-error" id="login-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your username">
        <span class="field-error" id="err-username">Username is required.</span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password">
        <span class="field-error" id="err-password">Password is required.</span>
      </div>

      <div class="form-group">
        <label for="usertype">User Type</label>
        <select id="usertype" name="usertype">
          <option value="">— Select your role —</option>
          <option value="student">🎓 Student</option>
          <option value="academic">📚 Academic Supervisor</option>
          <option value="supervisor">🏢 Internship Supervisor</option>
          <option value="admin">⚙️ Administrator</option>
        </select>
        <span class="field-error" id="err-usertype">Please select your user type.</span>
      </div>

      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script>
/* ==========================================================================
   AUTH HELPERS  (shared with signup.html and dashboard.html)
   ========================================================================== */
const AUTH_ACCOUNTS_KEY = 'iles_auth_accounts';
const AUTH_SESSION_KEY  = 'iles_auth_session';

function getAccounts() {
  return JSON.parse(localStorage.getItem(AUTH_ACCOUNTS_KEY) || '[]');
}

/* Simple hash — XOR-folded djb2.  Not crypto-grade; suitable for a demo. */
function hashPassword(password) {
  let h = 5381;
  for (let i = 0; i < password.length; i++) {
    h = ((h << 5) + h) ^ password.charCodeAt(i);
    h = h & 0xffffffff;
  }
  return (h >>> 0).toString(16).padStart(8, '0');
}

/* =========================================================================
   SEED demo accounts the first time (matches the dashboard seed users)
   ========================================================================= */
function seedDemoAccounts() {
  if (localStorage.getItem('iles_demo_accounts_seeded')) return;
  const demo = [
    { username:'alice',     passwordHash: hashPassword('alice123'),     role:'student',    displayName:'Alice Mwangi',    userId:'u1' },
    { username:'brian',     passwordHash: hashPassword('brian123'),     role:'student',    displayName:'Brian Otieno',    userId:'u2' },
    { username:'carol',     passwordHash: hashPassword('carol123'),     role:'academic',   displayName:'Dr Carol Njeru',  userId:'u3' },
    { username:'david',     passwordHash: hashPassword('david123'),     role:'supervisor', displayName:'David Kamau',     userId:'u4' },
    { username:'admin',     passwordHash: hashPassword('admin123'),     role:'admin',      displayName:'Admin User',      userId:'u5' },
  ];
  const existing = getAccounts();
  const existingUsernames = new Set(existing.map(a => a.username));
  demo.forEach(d => { if (!existingUsernames.has(d.username)) existing.push(d); });
  localStorage.setItem(AUTH_ACCOUNTS_KEY, JSON.stringify(existing));
  localStorage.setItem('iles_demo_accounts_seeded', '1');
}

seedDemoAccounts();

/* ==========================================================================
   FORM VALIDATION & SUBMIT
   ========================================================================== */
const form        = document.getElementById('login-form');
const errorBanner = document.getElementById('login-error');

function showFieldError(fieldId, errId, show) {
  const field = document.getElementById(fieldId);
  const err   = document.getElementById(errId);
  if (show) {
    field.classList.add('error');
    err.classList.add('visible');
  } else {
    field.classList.remove('error');
    err.classList.remove('visible');
  }
}

function showBanner(msg) {
  errorBanner.textContent = msg;
  errorBanner.className = 'alert alert-error visible';
}

function hideBanner() {
  errorBanner.className = 'alert alert-error';
}

form.addEventListener('submit', function (e) {
  e.preventDefault();
  hideBanner();

  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const usertype = document.getElementById('usertype').value;

  let valid = true;
  showFieldError('username', 'err-username', !username);
  if (!username) valid = false;

  showFieldError('password', 'err-password', !password);
  if (!password) valid = false;

  showFieldError('usertype', 'err-usertype', !usertype);
  if (!usertype) valid = false;

  if (!valid) return;

  const accounts = getAccounts();
  const account  = accounts.find(a => a.username === username);

  if (!account) {
    showBanner('No account found with that username.');
    return;
  }

  if (account.passwordHash !== hashPassword(password)) {
    showBanner('Incorrect password. Please try again.');
    return;
  }

  if (account.role !== usertype) {
    showBanner('User type does not match the account. Please select the correct role.');
    return;
  }

  /* Persist session */
  const session = {
    username:    account.username,
    displayName: account.displayName,
    role:        account.role,
    userId:      account.userId,
    loginAt:     new Date().toISOString(),
  };
  localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(session));

  window.location.href = 'dashboard.html';
});

/* Clear field errors on input */
['username', 'password', 'usertype'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const errMap = { username:'err-username', password:'err-password', usertype:'err-usertype' };
    showFieldError(id, errMap[id], false);
    hideBanner();
  });
});
</script>
</body>
</html>
